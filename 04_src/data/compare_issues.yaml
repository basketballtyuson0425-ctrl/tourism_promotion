issues:
  - id: issue-view-spread
    category: 再生数の広がり
    title: 同じ12検索語でも、宮島の総再生数が上回っている
    detail: 伊勢志摩は43本、宮島は35本だが、総再生数は宮島の方が多い。英語圏で広く見られる代表動画を増やす余地がある。
    createdAt: '2026-05-29T00:00:00.000Z'
  - id: issue-engagement-spread
    category: 反応率
    title: 高反応の見せ方を、より多くの動画に広げる
    detail: 平均エンゲージメント率は伊勢志摩が上回る一方、合計いいね数・コメント数は宮島が多い。反応されやすい体験型の見せ方を増やしたい。
    createdAt: '2026-05-29T00:00:00.000Z'
  - id: issue-itinerary-clarity
    category: 旅程の分かりやすさ
    title: 伊勢神宮、英虞湾、食体験を1本の流れにする
    detail: 宮島はフェリーや日帰り旅行の文脈で見せやすい。伊勢志摩は移動と滞在時間を含めたモデルコースとして伝えると比較しやすい。
    createdAt: '2026-05-29T00:00:00.000Z'
  - id: issue-unique-value
    category: 独自性の打ち出し
    title: 海女文化や英虞湾を、宮島にはない体験価値として前面に出す
    detail: 神社・海景観・食は共通するため、伊勢志摩ならではの人物、体験、海の文化を組み合わせると差別化しやすい。
    createdAt: '2026-05-29T00:00:00.000Z'
