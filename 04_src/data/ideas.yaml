ideas:
  - id: idea-001
    title: 早朝の伊勢神宮と食体験を組み合わせた動画企画
    summary: 早朝参拝、周辺散策、海産物の食体験を1本の動画で見せる。
    targetMarket: 米国
    theme: 文化
    priority: 高
